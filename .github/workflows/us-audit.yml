name: US Fork Audit

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  backend-audit:
    runs-on: ubuntu-latest
    env:
      APP_TIMEZONE: America/New_York
      LGB_DEVICE: cpu
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall src

      - name: Smoke import FastAPI app
        run: python -c "from src.interfaces.app import app; print(app.title); print(app.version)"

      - name: Run pytest if tests exist
        shell: bash
        run: |
          if [ -d tests ]; then
            pytest -q
          else
            echo "No tests/ directory found; skipping pytest."
          fi

      - name: Start backend server
        run: |
          nohup uvicorn src.interfaces.app:app --host 127.0.0.1 --port 8000 > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Wait for health endpoint
        run: |
          python - <<'PY'
          import sys
          import time
          import httpx

          url = 'http://127.0.0.1:8000/api/v1/system/health'
          for _ in range(30):
              try:
                  r = httpx.get(url, timeout=5.0)
                  r.raise_for_status()
                  print(r.text)
                  sys.exit(0)
              except Exception:
                  time.sleep(2)
          raise SystemExit('Backend health check did not become ready in time')
          PY

      - name: Smoke test core US endpoints
        run: |
          python - <<'PY'
          import httpx

          base = 'http://127.0.0.1:8000/api/v1'
          endpoints = [
              '/system/health',
              '/datasets',
              '/datasets/categories',
              '/universe',
              '/sync/all-status',
          ]
          with httpx.Client(timeout=20.0) as client:
              for endpoint in endpoints:
                  response = client.get(base + endpoint)
                  response.raise_for_status()
                  print(endpoint, response.status_code)
          PY

      - name: Show backend log on failure
        if: failure()
        run: |
          echo '--- backend.log ---'
          cat backend.log || true

      - name: Stop backend server
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill $(cat backend.pid) || true
          fi

  frontend-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000
        run: npm run build
